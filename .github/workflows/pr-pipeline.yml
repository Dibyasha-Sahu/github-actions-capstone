name: PR Pipeline

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
permissions:
  contents: read      

jobs:
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python-version: "3.12"
      run_tests: true

  dependency-review:
    needs: build-test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Dependencies for Vulnerabilities
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical

  pr-comment:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Print PR message
        run: |
          echo "PR checks passed for branch: ${{ github.head_ref }}"