name: PR Pipeline

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize]

jobs:
  build-test:
  uses: ./.github/workflows/resuable-build-test.yml
  with:
    python-version: "3.9"
    run_tests: true

  pr-comment:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Print PR message
        run: echo "PR checks passed for branch:${{ github.head_ref}}"
